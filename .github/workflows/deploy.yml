name: Backend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/home/tanga/apps/smartcard/backend"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd

            cat > deploy/backend.env <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF

            echo "${{ secrets.VPS_SUDO_PASSWORD }}" | sudo -S docker compose -f deploy/docker-compose.backend.yml up -d --build
            curl -fsS http://127.0.0.1:4000/health
