name: Backend CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/smartcard_test
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Run test suite
        run: npm run test

      - name: Smoke checks
        run: npm run smoke
